<!DOCTYPE html>
<html lang="{{ page.lang | default: "en" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | Private Karaoke Studio</title>
    <meta name="description" content="{{ page.description | default: "Private Karaoke Studio app information, privacy policy, and support." }}">
    <link rel="icon" media="(prefers-color-scheme:dark)" href="/assets/img/favicon-dark.png" type="image/png">
    <link rel="icon" media="(prefers-color-scheme:light)" href="/assets/img/favicon.png" type="image/png">
    <link rel="stylesheet" href="/assets/css/font.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
      header h1 {
        margin-bottom: 0.4rem;
      }

      nav {
        margin: 1.2rem 0 2rem;
        line-height: 1.7;
      }

      nav a {
        margin-right: 0.8rem;
      }

      section {
        padding-bottom: 2rem;
      }

      .meta {
        color: #666;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1>Private Karaoke Studio</h1>
        <p class="meta">Local karaoke and singing practice for macOS.</p>
        <nav>
          <a href="/apps/private-karaoke-studio/">Home</a>
          <a href="/apps/private-karaoke-studio/en/privacy/">Privacy</a>
          <a href="/apps/private-karaoke-studio/en/support/">Support</a>
        </nav>
      </header>
      <section>
        {{ content }}
      </section>
    </div>
    <script src="/assets/js/scale.fix.js"></script>
  </body>
</html>
